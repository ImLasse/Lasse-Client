name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.0"

      - name: Build
        run: gradle build --no-daemon --stacktrace

      - name: Read mod version
        id: meta
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Collect release jar
        id: jar
        run: |
          # The remapped production jar, excluding the -sources and -dev variants.
          JAR=$(ls build/libs/*.jar | grep -vE '\-(sources|dev|dev-shadow)\.jar$' | head -n1)
          if [ -z "$JAR" ]; then
            echo "No production jar found in build/libs" >&2
            ls -la build/libs || true
            exit 1
          fi
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "Found release jar: $JAR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Lasse Client ${{ steps.meta.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated release built from `main` (`${{ github.sha }}`).

            **Minecraft:** 1.21.11 · **Loader:** Fabric

            Drop `lasseclient-${{ steps.meta.outputs.version }}.jar` into your `mods/` folder
            alongside Fabric API and Fabric Language Kotlin.
          files: ${{ steps.jar.outputs.path }}
          draft: false
          prerelease: false
